stages: [build, publish, release]

# ---------------------
# Build & Test
# ---------------------
.build_template:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|dev)$/
  before_script:
    - apt-get update -qq && apt-get install -y -qq git cmake ninja-build
    - git submodule sync --recursive
    - git submodule update --init --recursive
  script:
    - cmake -B build -S .
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_CXX_COMPILER=$CXX_COMPILER
        -DCMAKE_C_COMPILER=$C_COMPILER
        -DSCL_BUILD_TESTS=ON
        -DSCL_BUILD_EXAMPLES=ON
    - cmake --build build --config Debug
    - ctest --test-dir build --build-config Debug --output-on-failure

build:gcc:
  extends: .build_template
  image: gcc:14
  variables:
    CXX_COMPILER: g++
    C_COMPILER: gcc

build:clang:
  extends: .build_template
  image: silkeh/clang:21
  variables:
    CXX_COMPILER: clang++
    C_COMPILER: clang
  before_script:
    - ulimit -s unlimited
    - apt-get update -qq && apt-get install -y -qq git cmake ninja-build
    - git submodule sync --recursive
    - git submodule update --init --recursive

# ---------------------
# Documentation
# ---------------------
pages:
  stage: publish
  image: python:3.12
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        MIKE_VERSION: main
        MIKE_ALIAS: latest
    - if: $CI_COMMIT_BRANCH == "dev"
      variables:
        MIKE_VERSION: dev
        MIKE_ALIAS: ""
    - if: $CI_COMMIT_TAG =~ /^v/
      variables:
        MIKE_VERSION: $CI_COMMIT_TAG
        MIKE_ALIAS: latest
  variables:
    GIT_DEPTH: 0
    MIKE_ALIAS: ""
  before_script:
    - git submodule sync --recursive
    - git submodule update --init --recursive
    - apt-get update && apt-get install -y doxygen graphviz
    - pip install mkdocs mkdocs-material mkdoxy mike
    - git config user.email "ci@gitlab.com"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://oauth2:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin pages:pages 2>/dev/null || true
  script:
    - mike deploy --branch pages --push ${MIKE_VERSION} ${MIKE_ALIAS}
    - mike set-default --branch pages --push latest 2>/dev/null || true
    - mkdir -p public
    - git archive pages | tar -x -C public
  artifacts:
    paths:
      - public

# ---------------------
# Mirror to GitHub
# ---------------------
mirror:github:
  stage: publish
  image:
    name: alpine/git
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
    # Set in GitLab CI/CD project variables (Settings → CI/CD → Variables):
    #   GITHUB_TOKEN       - GitHub PAT with Contents: Write (masked, group-level)
    #   GITHUB_MIRROR_URL  - https://github.com/ssoft-hub/scl-kit.git
  script:
    - sh script/ci/mirror_github.sh

# ---------------------
# Release
# ---------------------
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
