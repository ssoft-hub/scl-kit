name: Documentation

on:
  push:
    branches: [main, dev]
    tags: ['v*']

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
          pip install mkdocs mkdocs-material mkdoxy mike

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin gh-pages 2>/dev/null || true

      - name: Determine version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "MIKE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
            echo "MIKE_ALIAS=latest" >> $GITHUB_ENV
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "MIKE_VERSION=main" >> $GITHUB_ENV
            echo "MIKE_ALIAS=latest" >> $GITHUB_ENV
          else
            echo "MIKE_VERSION=dev" >> $GITHUB_ENV
            echo "MIKE_ALIAS=" >> $GITHUB_ENV
          fi

      - name: Deploy with mike
        run: |
          mike deploy --push $MIKE_VERSION $MIKE_ALIAS
          mike set-default --push latest 2>/dev/null || true
